<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesoamerican Mafia 3D - Tlachtli</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050508;
            color: #d4af37;
            overflow: hidden;
            /* Remove scrollbars for fullscreen 3D */
            font-family: 'Georgia', serif;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* 3D Canvas matches screen size */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            text-align: center;
            text-transform: uppercase;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            text-shadow: 2px 2px 4px #000, 0 0 15px rgba(212, 175, 55, 0.8);
            letter-spacing: 3px;
        }

        #scoreboard {
            margin-top: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #d4af37;
            padding: 5px 20px;
            border-radius: 5px;
            display: inline-block;
            text-shadow: 1px 1px 2px #000;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: #a89675;
            z-index: 10;
            pointer-events: none;
        }
    </style>
    <!-- Import Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <div id="ui-layer">
        <h1>Ritual 3D</h1>
        <div id="scoreboard">0 - 0</div>
    </div>

    <div id="controls-hint">
        WASD/Flechas: Mover Jugador<br>
        La Piedra Oscura exige fuerza para rodar.
    </div>

    <!-- The 3D Engine will inject the WebGL Canvas here -->
    <div id="gameContainer"></div>

    <script src="game3d.js"></script>
</body>

</html>
